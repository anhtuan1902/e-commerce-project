server {
    listen 80;
    server_name localhost;

    # Thư mục chứa file build của React
    root /usr/share/nginx/html;
    index index.html;

    # QUAN TRỌNG NHẤT cho React Router
    # Khi user vào /products/123, Nginx không có file đó
    # try_files: thử tìm file → thử tìm folder → fallback về index.html
    # React Router sẽ tự xử lý route /products/123 phía client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: khi frontend gọi /api/...
    # Nginx tự động forward sang backend container
    # Không cần CORS vì request đi nội bộ giữa các container
    location /api {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        # Cần thiết cho WebSocket (nếu dùng)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        # Giữ nguyên host header gốc
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets 1 năm
    # JS/CSS/ảnh không đổi → browser cache → load nhanh hơn
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Ẩn version Nginx — tránh attacker biết version để exploit
    server_tokens off;
}