name: CI/CD Pipeline

# ──────────────────────────────────────────────────────────
# Kích hoạt khi nào?
# ──────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write   # buildx dùng GitHub cache (type=gha)

# Ngăn 2 run chạy song song trên cùng 1 branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════
  # JOB 1: Test Backend
  # Database: PostgreSQL (local) — dùng trong CI test
  # ══════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔧 Create test .env
        working-directory: ./backend
        run: |
          echo "DB_PROVIDER=local"          >> .env
          echo "DB_HOST=localhost"          >> .env
          echo "DB_PORT=5432"               >> .env
          echo "DB_NAME=marketplace_test"   >> .env
          echo "DB_USER=postgres"           >> .env
          echo "DB_PASSWORD=testpassword"   >> .env
          echo "JWT_SECRET=test_secret"     >> .env
          echo "NODE_ENV=test"              >> .env
          echo "SERVICE_URI_REDIS="        >> .env
          echo "SERVICE_URI_POSTGRES="     >> .env

      - name: 🔍 Lint Backend
        working-directory: ./backend
        run: npm run lint

      - name: ✅ Run tests
        working-directory: ./backend
        run: npm test

  # ══════════════════════════════════════════════════════════
  # JOB 2: Test Frontend
  # ══════════════════════════════════════════════════════════
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔍 Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: ✅ Run tests
        working-directory: ./frontend
        run: npm test -- --run

      - name: 🔨 Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

  # ══════════════════════════════════════════════════════════
  # JOB 3: Build & Push Backend Docker Image → Docker Hub
  # Chỉ chạy khi: push lên main VÀ test-backend pass
  # ══════════════════════════════════════════════════════════
  build-backend:
    name: 🐳 Build & Push Backend → Docker Hub
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔓 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketplace-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketplace-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ══════════════════════════════════════════════════════════
  # JOB 4: Build & Push Frontend Docker Image → Docker Hub
  # Chỉ chạy khi: push lên main VÀ test-frontend pass
  # ══════════════════════════════════════════════════════════
  build-frontend:
    name: 🐳 Build & Push Frontend → Docker Hub
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔓 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketplace-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketplace-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}

  # ══════════════════════════════════════════════════════════
  # JOB 5: Notify Render Backend — pull image mới từ Docker Hub
  # Chạy sau khi build-backend push image lên Docker Hub xong
  # ══════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Notify Render → Pull Backend image
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🔔 Trigger Render Backend Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

  # ══════════════════════════════════════════════════════════
  # JOB 6: Notify Render Frontend — pull image mới từ Docker Hub
  # Chạy sau khi build-frontend push image lên Docker Hub xong
  # ══════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🚀 Notify Render → Pull Frontend image
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🔔 Trigger Render Frontend Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
