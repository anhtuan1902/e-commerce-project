name: CI/CD Pipeline

# Kích hoạt khi nào?
on:
  push:
    branches: [main, develop] # push lên main hoặc develop
  pull_request:
    branches: [main] # tạo PR vào main

permissions:
  contents: read # Đọc code
  packages: write # Nếu push lên GitHub Packages
  id-token: write # Cho OIDC token (deploy an toàn)

jobs:
  # ══════════════════════════════════════════════════════
  # JOB 1: Test Backend
  # ══════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest # chạy trên máy ảo Ubuntu của GitHub

    services:
      # Tạo MySQL tạm để chạy test — tự xóa sau khi job xong
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: marketplace_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s

    steps:
      # Bước 1: Lấy code từ repo về máy ảo
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Node.js, có cache để lần sau nhanh hơn
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # Bước 3: Cài dependencies
      - name: 📦 Install dependencies
        working-directory: ./backend
        run: npm ci

      # Bước 4: Tạo file .env cho test
      - name: 🔧 Create test .env
        working-directory: ./backend
        run: |
          echo "DB_HOST=localhost"         >> .env
          echo "DB_NAME=marketplace_test" >> .env
          echo "DB_USER=root"             >> .env
          echo "DB_PASSWORD=testpassword" >> .env
          echo "JWT_SECRET=test_secret"   >> .env
          echo "NODE_ENV=test"            >> .env

      # Bước 5: Chạy migration trên DB test
      - name: 🗄️ Run migrations
        working-directory: ./backend
        run: npx sequelize-cli db:migrate

      # Bước 6: Chạy test (npm test)
      - name: ✅ Run tests
        working-directory: ./backend
        run: npm test

  # ══════════════════════════════════════════════════════
  # JOB 2: Test Frontend
  # ══════════════════════════════════════════════════════
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install
        working-directory: ./frontend
        run: npm ci

      # Chỉ build thử — nếu build lỗi thì báo ngay
      - name: 🔨 Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  # ══════════════════════════════════════════════════════
  # JOB 3: Build & Push Docker lên Docker Hub
  # Chỉ chạy khi: branch main VÀ cả 2 test đều pass
  # ══════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [test-backend, test-frontend] # phụ thuộc 2 job trên
    if: github.ref == 'refs/heads/main' # chỉ chạy trên main

    steps:
      - uses: actions/checkout@v4

      # Đăng nhập Docker Hub bằng secret đã config
      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Setup Buildx
        uses: docker/setup-buildx-action@v3

      # Build image backend + push lên Docker Hub
      - name: 🐳 Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marketplace-backend:latest
          cache-from: type=gha # dùng GitHub Actions cache
          cache-to: type=gha,mode=max

      # Build image frontend + push lên Docker Hub
      - name: 🐳 Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marketplace-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  # ══════════════════════════════════════════════════════
  # JOB 4: Deploy lên VPS
  # ══════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # SSH vào server và chạy lệnh deploy
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/marketplace
            git pull origin main

            # Pull image mới từ Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/marketplace-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/marketplace-frontend:latest

            # Restart với image mới, không rebuild
            docker-compose -f docker-compose.prod.yml up -d --no-build

            # Chạy migration mới nếu có
            docker exec marketplace_backend_prod npx sequelize-cli db:migrate

            # Xóa image cũ để tiết kiệm dung lượng
            docker image prune -f

            echo "✅ Deploy thành công!"
