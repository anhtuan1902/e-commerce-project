version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres_prod
    restart: always
    env_file:
      - ./database/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce_store_one_db}
      POSTGRES_USER: ${DB_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-190228aT}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - marketplace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # mysql:
  #   image: mysql:8.4
  #   container_name: marketplace_mysql_prod
  #   restart: always
  #   env_file:
  #     - ./database/.env
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-190228aT}
  #     MYSQL_DATABASE: ${DB_NAME:-ecommerce_store_one_db}
  #     MYSQL_USER: ${DB_USER:-ecommerce_user}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-190228aT}
  #   volumes:
  #     - mysql_data_prod:/var/lib/mysql
  #   networks:
  #     - marketplace_network
  #   profiles:
  #     - mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: marketplace_backend_prod
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-postgres}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - marketplace_network
    profiles:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: marketplace_frontend_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - marketplace_network

  redis:
    image: redis:7-alpine
    container_name: marketplace_redis_prod
    restart: always
    env_file:
      - ./backend/.env.production
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - marketplace_network
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  postgres_data_prod:
  mysql_data_prod:
  redis_data_prod:

networks:
  marketplace_network:
    driver: bridge
