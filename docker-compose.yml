services:
  mysql:
    image: mysql:8.0
    container_name: marketplace_mysql
    restart: always
    env_file:
      - .env
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - marketplace_network

  redis:
    image: redis:7
    container_name: marketplace_redis
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - marketplace_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketplace_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mysql
      - redis
    networks:
      - marketplace_network
    command: sh -c "while ! nc -z mysql 3306; do sleep 3; done && while ! nc -z redis 6379; do sleep 3; done && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketplace_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - marketplace_network
    command: npm run dev -- --host

volumes:
  mysql_data:
  redis_data:

networks:
  marketplace_network:
    driver: bridge